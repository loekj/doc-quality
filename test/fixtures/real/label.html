<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>doc-quality Label Tool</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  #top-bar { display: flex; align-items: center; padding: 8px 16px; gap: 12px; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; }
  #top-bar .progress { font-size: 14px; color: #999; }
  #top-bar .filters { display: flex; gap: 6px; margin-left: auto; }
  #top-bar .filters button { background: #333; border: 1px solid #555; color: #ccc; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #top-bar .filters button.active { background: #4a7dff; color: #fff; border-color: #4a7dff; }
  #top-bar .filters button:hover { background: #444; }
  #top-bar .filters button.active:hover { background: #3a6dee; }
  #export-btn { background: #2a5a2a; border: 1px solid #3a7a3a; color: #ccc; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #export-btn:hover { background: #3a7a3a; }

  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #image-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 12px; position: relative; }
  #image-area img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
  #image-info { position: absolute; top: 16px; left: 16px; background: rgba(0,0,0,0.75); padding: 6px 12px; border-radius: 4px; font-size: 13px; }
  #score-badge { position: absolute; top: 16px; right: 16px; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; }
  #score-badge.pass { background: #1a4a1a; color: #6f6; }
  #score-badge.fail { background: #4a1a1a; color: #f66; }
  #score-badge.loading { background: #333; color: #999; }
  #score-badge.no-analysis { background: #222; color: #666; }

  #controls { flex-shrink: 0; padding: 12px 16px; background: #1a1a1a; border-top: 1px solid #333; }
  #category-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #category-row .cat-label { font-size: 12px; color: #999; }
  .cat-btn { background: #2a2a2a; border: 1px solid #444; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; color: #ccc; user-select: none; transition: all 0.15s; }
  .cat-btn:hover { border-color: #888; }
  .cat-btn.active { background: #2a3a5a; border-color: #4a7dff; color: #8af; }
  #issue-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag { background: #2a2a2a; border: 1px solid #444; padding: 4px 10px; border-radius: 14px; cursor: pointer; font-size: 12px; user-select: none; transition: all 0.15s; }
  .tag:hover { border-color: #888; }
  .tag.checked { background: #4a3a1a; border-color: #c90; color: #fc0; }
  .tag.auto { box-shadow: 0 0 0 1px #666 inset; }

  #slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  #slider-row .slider-label { font-size: 12px; color: #999; white-space: nowrap; }
  #score-slider { flex: 1; accent-color: #4a7dff; height: 6px; cursor: pointer; }
  #slider-value { font-size: 14px; font-weight: 600; min-width: 36px; text-align: center; font-variant-numeric: tabular-nums; }
  #slider-value.pass { color: #6f6; }
  #slider-value.fail { color: #f66; }
  #slider-pass-indicator { font-size: 11px; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  #slider-pass-indicator.pass { background: #1a4a1a; color: #6f6; }
  #slider-pass-indicator.fail { background: #4a1a1a; color: #f66; }

  #action-row { display: flex; align-items: center; gap: 10px; }
  #notes { flex: 1; background: #222; border: 1px solid #444; color: #eee; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
  #notes:focus { outline: none; border-color: #4a7dff; }
  .action-btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .action-btn.very-good { background: #1a6a1a; color: #fff; }
  .action-btn.very-good:hover { background: #2a8a2a; }
  .action-btn.good { background: #2a7a2a; color: #fff; }
  .action-btn.good:hover { background: #3a8a3a; }
  .action-btn.bad { background: #b63; color: #fff; }
  .action-btn.bad:hover { background: #c74; }
  .action-btn.very-bad { background: #c33; color: #fff; }
  .action-btn.very-bad:hover { background: #d44; }
  .action-btn.skip { background: #555; color: #fff; }
  .action-btn.skip:hover { background: #666; }
  #nav-row { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
  .nav-btn { background: #333; border: 1px solid #555; color: #ccc; padding: 4px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .nav-btn:hover { background: #444; }

  kbd { display: inline-block; background: #333; border: 1px solid #555; border-radius: 3px; padding: 1px 5px; font-size: 11px; color: #aaa; margin-left: 4px; }

  #loading { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 18px; color: #666; }
  .label-indicator { font-size: 12px; padding: 2px 8px; border-radius: 3px; margin-left: 8px; }
  .label-indicator.very-good { background: #1a4a1a; color: #6f6; }
  .label-indicator.good { background: #2a5a2a; color: #8d8; }
  .label-indicator.bad { background: #4a3a1a; color: #fc0; }
  .label-indicator.very-bad { background: #4a1a1a; color: #f66; }
  .label-indicator.skip { background: #333; color: #999; }
  .label-indicator.pass { background: #1a4a1a; color: #6f6; }
  .label-indicator.fail { background: #4a1a1a; color: #f66; }

  /* Fullscreen zoom overlay */
  #zoom-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: #000; touch-action: none; }
  #zoom-overlay img { position: absolute; transform-origin: 0 0; }
  #zoom-close { position: fixed; top: 12px; right: 12px; z-index: 101; background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #555; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; display: none; }

  /* Mobile styles */
  @media (max-width: 768px) {
    #top-bar { flex-wrap: wrap; padding: 6px 10px; gap: 6px; }
    #top-bar .filters { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-left: 0; width: 100%; }
    #top-bar .filters button { white-space: nowrap; padding: 6px 10px; font-size: 13px; }
    #export-btn { padding: 8px 12px; font-size: 13px; }
    #image-area { padding: 4px; cursor: zoom-in; }
    #image-info { font-size: 11px; padding: 4px 8px; top: 8px; left: 8px; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #controls { padding: 8px 10px; }
    #category-row { gap: 4px; margin-bottom: 6px; }
    .cat-btn { padding: 8px 10px; font-size: 13px; }
    kbd { display: none; }
    #issue-tags { gap: 4px; margin-bottom: 6px; }
    .tag { padding: 6px 10px; font-size: 13px; }
    #slider-row { gap: 6px; margin-bottom: 6px; }
    #score-slider { height: 20px; }
    #slider-value { font-size: 16px; }
    #slider-pass-indicator { font-size: 13px; padding: 4px 10px; }
    #action-row { flex-wrap: wrap; gap: 6px; }
    #notes { width: 100%; flex: none; font-size: 16px; padding: 10px; }
    .action-btn { flex: 1 1 auto; min-width: 0; padding: 14px 8px; font-size: 15px; text-align: center; }
    #nav-row { gap: 6px; margin-top: 6px; }
    .nav-btn { flex: 1; padding: 12px 16px; font-size: 15px; text-align: center; }
    #zoom-close { display: block; }
  }
</style>
</head>
<body>

<div id="top-bar">
  <strong>Label Tool</strong>
  <span class="progress" id="progress">Loading...</span>
  <div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="unlabeled">Unlabeled</button>
    <button data-filter="very-good">Very Good</button>
    <button data-filter="good">Good</button>
    <button data-filter="bad">Bad</button>
    <button data-filter="very-bad">Very Bad</button>
    <button data-filter="conflicts">Conflicts</button>
  </div>
  <button id="export-btn">Export JSON</button>
</div>

<div id="main">
  <div id="image-area">
    <div id="loading">Loading images...</div>
    <img id="preview" style="display:none" alt="">
    <iframe id="pdf-preview" style="display:none; width:100%; height:100%; border:none; border-radius:4px; background:#fff;"></iframe>
    <div id="image-info" style="display:none"></div>
    <div id="score-badge" style="display:none"></div>
  </div>

  <div id="controls" style="display:none">
    <div id="category-row">
      <span class="cat-label">Category:</span>
      <button class="cat-btn" data-cat="document">Document <kbd>D</kbd></button>
      <button class="cat-btn" data-cat="receipt">Receipt <kbd>R</kbd></button>
      <button class="cat-btn" data-cat="card">Card <kbd>C</kbd></button>
      <button class="cat-btn" data-cat="photo">Photo <kbd>P</kbd></button>
    </div>
    <div id="issue-tags"></div>
    <div id="slider-row">
      <span class="slider-label">Score:</span>
      <input type="range" id="score-slider" min="0" max="100" step="1" value="75">
      <span id="slider-value">0.75</span>
      <span id="slider-pass-indicator">PASS</span>
    </div>
    <div id="action-row">
      <input id="notes" type="text" placeholder="Notes (optional)">
      <button class="action-btn very-bad" id="btn-very-bad">Very Bad <kbd>1</kbd></button>
      <button class="action-btn bad" id="btn-bad">Bad <kbd>2</kbd></button>
      <button class="action-btn good" id="btn-good">Good <kbd>3</kbd></button>
      <button class="action-btn very-good" id="btn-very-good">Very Good <kbd>4</kbd></button>
      <button class="action-btn skip" id="btn-skip">Skip <kbd>S</kbd></button>
    </div>
    <div id="nav-row">
      <button class="nav-btn" id="btn-prev">&larr; Prev <kbd>&larr;</kbd></button>
      <button class="nav-btn" id="btn-next">Next &rarr; <kbd>&rarr;</kbd></button>
    </div>
  </div>
</div>

<div id="zoom-overlay"><img id="zoom-img" alt=""><button id="zoom-close">&times;</button></div>

<script>
const ISSUE_MAP = {
  'Blurry':       ['sharpness', 'fftBlur'],
  'Too dark':     ['brightness', 'dimBackground'],
  'Too bright':   ['brightness'],
  'Glare':        ['shadow'],
  'Moire':        ['fftMoire'],
  'Tilted':       ['skew'],
  'Shadows':      ['shadow', 'darkShadow'],
  'Low res':      ['resolution'],
  'Compressed':   ['compression', 'fftJpegArtifact'],
  'Faded text':   ['textContrast'],
  'Motion blur':  ['directionalBlur'],
  'Noisy':        ['fftNoise'],
  'Partial/cropped': ['partial'],
};

// Map directory category names to preset names
const DIR_TO_PRESET = {
  documents: 'document',
  receipts: 'receipt',
  cards: 'card',
  photos: 'receipt',
};

let allImages = [];
let filteredImages = [];
let currentIndex = 0;
let currentFilter = 'all';
let currentAnalysis = null;
let currentCategory = 'document';
let checkedIssues = new Set();

// DOM refs
const $progress = document.getElementById('progress');
const $preview = document.getElementById('preview');
const $imageInfo = document.getElementById('image-info');
const $scoreBadge = document.getElementById('score-badge');
const $controls = document.getElementById('controls');
const $issueTags = document.getElementById('issue-tags');
const $notes = document.getElementById('notes');
const $loading = document.getElementById('loading');
const $catBtns = document.querySelectorAll('.cat-btn');
const $scoreSlider = document.getElementById('score-slider');
const $sliderValue = document.getElementById('slider-value');
const $sliderPassInd = document.getElementById('slider-pass-indicator');

// Quartile centers: VB=0–25, B=25–50, G=50–75, VG=75–100
const TIER_SLIDER_DEFAULTS = { 'very-bad': 12, 'bad': 37, 'good': 62, 'very-good': 87 };

function updateSliderDisplay() {
  const val = $scoreSlider.valueAsNumber / 100;
  $sliderValue.textContent = val.toFixed(2);
  const pass = val >= 0.5;
  $sliderValue.className = pass ? 'pass' : 'fail';
  $sliderPassInd.textContent = pass ? 'PASS' : 'FAIL';
  $sliderPassInd.className = pass ? 'pass' : 'fail';
}

$scoreSlider.addEventListener('input', () => {
  updateSliderDisplay();
  // Auto-save if image is already labeled
  const img = filteredImages[currentIndex];
  if (img && img.label) saveLabel(img.label.label, { advance: false });
});

// Init
async function init() {
  const res = await fetch('/api/images');
  allImages = await res.json();
  applyFilter();
  if (filteredImages.length > 0) {
    $loading.style.display = 'none';
    $preview.style.display = '';
    $imageInfo.style.display = '';
    $controls.style.display = '';
    showImage(0);
  } else {
    $loading.textContent = 'No images found';
  }
}

function applyFilter() {
  if (currentFilter === 'all') {
    filteredImages = allImages;
  } else if (currentFilter === 'unlabeled') {
    filteredImages = allImages.filter(img => !img.label);
  } else if (['very-good', 'good', 'bad', 'very-bad'].includes(currentFilter)) {
    filteredImages = allImages.filter(img => img.label && img.label.label === currentFilter);
  } else if (currentFilter === 'conflicts') {
    filteredImages = allImages.filter(img => {
      if (!img.label || !img._analysis) return false;
      const labelGood = img.label.label === 'very-good' || img.label.label === 'good';
      return labelGood !== img._analysis.pass;
    });
  }
  if (currentIndex >= filteredImages.length) currentIndex = Math.max(0, filteredImages.length - 1);
  updateProgress();
}

function updateProgress() {
  const labeled = allImages.filter(i => i.label).length;
  const counts = { 'very-good': 0, 'good': 0, 'bad': 0, 'very-bad': 0 };
  for (const img of allImages) {
    if (img.label && counts[img.label.label] !== undefined) counts[img.label.label]++;
  }
  const breakdown = `VG:${counts['very-good']} G:${counts['good']} B:${counts['bad']} VB:${counts['very-bad']}`;
  $progress.textContent = `${labeled}/${allImages.length} labeled [${breakdown}] | showing ${filteredImages.length} (${currentFilter})`;
}

/** Infer the initial category for an image from its directory or saved label */
function inferCategory(img) {
  // Saved label takes precedence
  if (img.label && img.label.category) return img.label.category;
  // Infer from directory path
  const dirCat = img.category; // e.g. 'documents', 'receipts', 'cards', 'photos'
  return DIR_TO_PRESET[dirCat] || 'document';
}

function setCategory(cat) {
  currentCategory = cat;
  $catBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
}

function showImage(idx) {
  if (idx < 0 || idx >= filteredImages.length) return;
  currentIndex = idx;
  currentAnalysis = null;
  checkedIssues.clear();

  const img = filteredImages[idx];
  const isPdf = img.path.toLowerCase().endsWith('.pdf');
  const $pdfPreview = document.getElementById('pdf-preview');
  const imgUrl = `/api/image/${encodeURIComponent(img.path)}`;

  if (isPdf) {
    $preview.style.display = 'none';
    $pdfPreview.style.display = '';
    $pdfPreview.src = imgUrl;
  } else {
    $pdfPreview.style.display = 'none';
    $pdfPreview.src = '';
    $preview.style.display = '';
    $preview.src = imgUrl;
  }

  $imageInfo.innerHTML = `<b>${img.path}</b>` +
    (img.label ? `<span class="label-indicator ${img.label.label}">${img.label.label}</span>` : '');

  // Set category
  setCategory(inferCategory(img));

  // Restore existing label data
  if (img.label) {
    $notes.value = img.label.notes || '';
    for (const issue of (img.label.issues || [])) checkedIssues.add(issue);
    // Restore slider: use saved score, or infer from tier label
    if (img.label.score != null) {
      $scoreSlider.value = Math.round(img.label.score * 100);
    } else if (TIER_SLIDER_DEFAULTS[img.label.label] != null) {
      $scoreSlider.value = TIER_SLIDER_DEFAULTS[img.label.label];
    } else {
      $scoreSlider.value = 50;
    }
  } else {
    $notes.value = '';
    $scoreSlider.value = 50;
  }
  updateSliderDisplay();

  $scoreBadge.style.display = 'none';

  renderTags();
  updateProgress();
}

function renderTags() {
  const analyzerNames = currentAnalysis
    ? new Set(currentAnalysis.issues.map(i => i.analyzer))
    : new Set();

  $issueTags.innerHTML = '';
  for (const [uiLabel, analyzers] of Object.entries(ISSUE_MAP)) {
    const tag = document.createElement('span');
    tag.className = 'tag';
    const isAuto = analyzers.some(a => analyzerNames.has(a));
    const isChecked = analyzers.some(a => checkedIssues.has(a));
    if (isChecked) tag.classList.add('checked');
    if (isAuto) tag.classList.add('auto');
    tag.textContent = uiLabel;
    tag.addEventListener('click', () => {
      if (isChecked) {
        for (const a of analyzers) checkedIssues.delete(a);
      } else {
        for (const a of analyzers) checkedIssues.add(a);
      }
      renderTags();
      // Auto-save if already labeled
      const img = filteredImages[currentIndex];
      if (img && img.label) saveLabel(img.label.label, { advance: false });
    });
    $issueTags.appendChild(tag);
  }
}

async function saveLabel(label, { advance = true } = {}) {
  const img = filteredImages[currentIndex];
  if (!img) return;

  // Only auto-set slider for new labels (not re-labels)
  if (!img.label && TIER_SLIDER_DEFAULTS[label] != null) {
    $scoreSlider.value = TIER_SLIDER_DEFAULTS[label];
    updateSliderDisplay();
  }

  const score = $scoreSlider.valueAsNumber / 100;

  const body = {
    path: img.path,
    label,
    score,
    category: currentCategory,
    issues: Array.from(checkedIssues),
    notes: $notes.value.trim(),
  };

  await fetch('/api/label', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  // Update local state
  img.label = { label, score, category: currentCategory, issues: body.issues, notes: body.notes, timestamp: new Date().toISOString() };
  // Also update in allImages
  const master = allImages.find(i => i.path === img.path);
  if (master) master.label = img.label;

  applyFilter();

  if (advance) {
    // Move to next
    if (currentIndex < filteredImages.length - 1) {
      showImage(currentIndex + 1);
    } else if (filteredImages.length > 0) {
      showImage(Math.min(currentIndex, filteredImages.length - 1));
    }
  } else {
    // Stay on current image — refresh display
    showImage(currentIndex);
  }
  updateProgress();
}

// Button handlers — advance only for new labels, stay for re-labels
function labelClick(tier) {
  const img = filteredImages[currentIndex];
  const isRelabel = img && img.label;
  saveLabel(tier, { advance: !isRelabel });
}
document.getElementById('btn-very-bad').addEventListener('click', () => labelClick('very-bad'));
document.getElementById('btn-bad').addEventListener('click', () => labelClick('bad'));
document.getElementById('btn-good').addEventListener('click', () => labelClick('good'));
document.getElementById('btn-very-good').addEventListener('click', () => labelClick('very-good'));
document.getElementById('btn-skip').addEventListener('click', () => saveLabel('skip'));
document.getElementById('btn-prev').addEventListener('click', () => showImage(currentIndex - 1));
document.getElementById('btn-next').addEventListener('click', () => showImage(currentIndex + 1));

// Category buttons — auto-save on change
$catBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    setCategory(btn.dataset.cat);
    const img = filteredImages[currentIndex];
    if (img && img.label) saveLabel(img.label.label, { advance: false });
  });
});

// Auto-save notes on blur
$notes.addEventListener('blur', () => {
  const img = filteredImages[currentIndex];
  if (img && img.label) saveLabel(img.label.label, { advance: false });
});

// Filter buttons
document.querySelectorAll('#top-bar .filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#top-bar .filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilter();
    if (filteredImages.length > 0) showImage(0);
  });
});

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  window.open('/api/labels', '_blank');
});

// Auto-save helper for already-labeled images
function autoSaveIfLabeled() {
  const img = filteredImages[currentIndex];
  if (img && img.label) saveLabel(img.label.label, { advance: false });
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Don't intercept when typing in notes
  if (document.activeElement === $notes) return;

  switch (e.key.toLowerCase()) {
    case '1': labelClick('very-bad'); break;
    case '2': labelClick('bad'); break;
    case '3': labelClick('good'); break;
    case '4': labelClick('very-good'); break;
    case 's': saveLabel('skip'); break;
    case 'arrowleft': showImage(currentIndex - 1); break;
    case 'arrowright': showImage(currentIndex + 1); break;
    case 'd': setCategory('document'); autoSaveIfLabeled(); break;
    case 'r': setCategory('receipt'); autoSaveIfLabeled(); break;
    case 'c': setCategory('card'); autoSaveIfLabeled(); break;
    case 'p': setCategory('photo'); autoSaveIfLabeled(); break;
    case '+': case '=':
      $scoreSlider.value = Math.min(100, $scoreSlider.valueAsNumber + 5);
      updateSliderDisplay();
      autoSaveIfLabeled();
      break;
    case '-':
      $scoreSlider.value = Math.max(0, $scoreSlider.valueAsNumber - 5);
      updateSliderDisplay();
      autoSaveIfLabeled();
      break;
  }
});

// --- Mobile: pinch-to-zoom overlay ---
const $zoomOverlay = document.getElementById('zoom-overlay');
const $zoomImg = document.getElementById('zoom-img');
const $zoomClose = document.getElementById('zoom-close');
let zoomScale = 1, zoomX = 0, zoomY = 0, lastDist = 0, lastCenter = null, isPanning = false, panStart = null;

function openZoom() {
  $zoomImg.src = $preview.src;
  zoomScale = 1; zoomX = 0; zoomY = 0;
  $zoomOverlay.style.display = 'block';
  $zoomImg.onload = () => {
    // Fit image to screen
    const sw = window.innerWidth, sh = window.innerHeight;
    const iw = $zoomImg.naturalWidth, ih = $zoomImg.naturalHeight;
    zoomScale = Math.min(sw / iw, sh / ih);
    zoomX = (sw - iw * zoomScale) / 2;
    zoomY = (sh - ih * zoomScale) / 2;
    applyZoomTransform();
  };
}

function closeZoom() { $zoomOverlay.style.display = 'none'; }
function applyZoomTransform() {
  $zoomImg.style.transform = `translate(${zoomX}px, ${zoomY}px) scale(${zoomScale})`;
}

function dist(t) { const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY; return Math.hypot(dx, dy); }
function center(t) { return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 }; }

$zoomOverlay.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    lastDist = dist(e.touches);
    lastCenter = center(e.touches);
  } else if (e.touches.length === 1) {
    isPanning = true;
    panStart = { x: e.touches[0].clientX - zoomX, y: e.touches[0].clientY - zoomY };
  }
}, { passive: true });

$zoomOverlay.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d = dist(e.touches), c = center(e.touches);
    const factor = d / lastDist;
    const newScale = Math.max(0.5, Math.min(10, zoomScale * factor));
    // Zoom toward pinch center
    zoomX = c.x - (c.x - zoomX) * (newScale / zoomScale);
    zoomY = c.y - (c.y - zoomY) * (newScale / zoomScale);
    zoomScale = newScale;
    lastDist = d;
    lastCenter = c;
    applyZoomTransform();
  } else if (e.touches.length === 1 && isPanning) {
    zoomX = e.touches[0].clientX - panStart.x;
    zoomY = e.touches[0].clientY - panStart.y;
    applyZoomTransform();
  }
}, { passive: false });

$zoomOverlay.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) { lastDist = 0; lastCenter = null; }
  if (e.touches.length === 0) isPanning = false;
}, { passive: true });

// Double-tap to reset zoom
let lastTap = 0;
$zoomOverlay.addEventListener('click', (e) => {
  if (e.target === $zoomClose) { closeZoom(); return; }
  const now = Date.now();
  if (now - lastTap < 300) {
    // Double-tap: toggle between fit and 1:1
    const sw = window.innerWidth, sh = window.innerHeight;
    const iw = $zoomImg.naturalWidth, ih = $zoomImg.naturalHeight;
    const fitScale = Math.min(sw / iw, sh / ih);
    if (Math.abs(zoomScale - fitScale) < 0.01) {
      zoomScale = 1;
      zoomX = (sw - iw) / 2; zoomY = (sh - ih) / 2;
    } else {
      zoomScale = fitScale;
      zoomX = (sw - iw * zoomScale) / 2; zoomY = (sh - ih * zoomScale) / 2;
    }
    applyZoomTransform();
  }
  lastTap = now;
});

$zoomClose.addEventListener('click', closeZoom);

// Tap image to zoom on mobile
$preview.addEventListener('click', () => {
  if (window.innerWidth <= 768) openZoom();
});

// --- Mobile: swipe nav on image area ---
let swipeStartX = null;
const $imageArea = document.getElementById('image-area');
$imageArea.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) swipeStartX = e.touches[0].clientX;
}, { passive: true });
$imageArea.addEventListener('touchend', (e) => {
  if (swipeStartX === null) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  swipeStartX = null;
  if (Math.abs(dx) > 60) {
    if (dx > 0) showImage(currentIndex - 1);
    else showImage(currentIndex + 1);
  }
}, { passive: true });

init();
</script>
</body>
</html>
